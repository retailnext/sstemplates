---
name: Main Build
on:
  push:
    branches:
      - main
env:
  # renovate: datasource=java-version depName=java-jdk
  JAVA_VERSION: '26.0.0+35'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      code-quality: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
      - name: Build
        run: ./gradlew build testCodeCoverageReport
      - name: Test Report
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
      - name: Upload coverage report
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: build/reports/jacoco/testCodeCoverageReport/cobertura-testCodeCoverageReport.xml
          language: Java
          label: code-coverage/jacoco
      - name: Publish Snapshot
        run: ./gradlew publishAllPublicationsToGithubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
