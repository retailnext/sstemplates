---
name: Release
on:
  release:
    types:
      - published
env:
  # renovate: datasource=java-version depName=java-jdk
  JAVA_VERSION: '26.0.0+35'
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      checks: write
      contents: read
      packages: write
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build and Publish to Maven Central
        run: ./gradlew build publishAggregationToCentralPortal -Pversion=${GITHUB_REF_NAME##v}
        env:
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGithubPackagesRepository -Pversion=${GITHUB_REF_NAME##v}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Test Report
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
